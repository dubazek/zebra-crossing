<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Safe Street Crosser</title>
<link rel="stylesheet" href="zebra.css">
</head>
<body>

<div id="game-wrapper">

  <!-- ── SKY ── -->
  <div id="sky-zone">
    <!-- SVG Environment -->
    <svg id="env-svg" width="100%" height="100%" viewBox="0 0 600 180" preserveAspectRatio="xMidYMid slice" style="position:absolute;top:0;left:0;">
      <!-- Sun -->
      <g transform="translate(540,50)">
        <g id="sun-rays">
          <line x1="0" y1="-38" x2="0" y2="-28" stroke="#FFD60A" stroke-width="4" stroke-linecap="round"/>
          <line x1="27" y1="-27" x2="20" y2="-20" stroke="#FFD60A" stroke-width="4" stroke-linecap="round"/>
          <line x1="38" y1="0" x2="28" y2="0" stroke="#FFD60A" stroke-width="4" stroke-linecap="round"/>
          <line x1="27" y1="27" x2="20" y2="20" stroke="#FFD60A" stroke-width="4" stroke-linecap="round"/>
          <line x1="0" y1="38" x2="0" y2="28" stroke="#FFD60A" stroke-width="4" stroke-linecap="round"/>
          <line x1="-27" y1="27" x2="-20" y2="20" stroke="#FFD60A" stroke-width="4" stroke-linecap="round"/>
          <line x1="-38" y1="0" x2="-28" y2="0" stroke="#FFD60A" stroke-width="4" stroke-linecap="round"/>
          <line x1="-27" y1="-27" x2="-20" y2="-20" stroke="#FFD60A" stroke-width="4" stroke-linecap="round"/>
        </g>
        <circle r="22" fill="#FFD60A" stroke="#FF9F0A" stroke-width="3"/>
        <circle cx="-7" cy="-5" r="4" fill="#FF9F0A"/>
        <circle cx="7" cy="-5" r="4" fill="#FF9F0A"/>
        <path d="M-8 6 Q0 14 8 6" stroke="#FF9F0A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </g>
      <!-- Clouds -->
      <g class="cloud" transform="translate(60,30)">
        <ellipse cx="0" cy="0" rx="35" ry="20" fill="white" opacity="0.95"/>
        <ellipse cx="25" cy="-5" rx="25" ry="16" fill="white" opacity="0.95"/>
        <ellipse cx="-20" cy="-3" rx="20" ry="13" fill="white" opacity="0.95"/>
      </g>
      <g class="cloud" transform="translate(240,50)">
        <ellipse cx="0" cy="0" rx="28" ry="15" fill="white" opacity="0.9"/>
        <ellipse cx="20" cy="-4" rx="20" ry="12" fill="white" opacity="0.9"/>
        <ellipse cx="-15" cy="-2" rx="16" ry="10" fill="white" opacity="0.9"/>
      </g>
      <g class="cloud" transform="translate(420,25)">
        <ellipse cx="0" cy="0" rx="32" ry="18" fill="white" opacity="0.85"/>
        <ellipse cx="22" cy="-5" rx="22" ry="14" fill="white" opacity="0.85"/>
        <ellipse cx="-18" cy="-3" rx="18" ry="11" fill="white" opacity="0.85"/>
      </g>
    </svg>
  </div>

  <!-- ── GRASS TOP ── -->
  <div id="grass-top">
    <!-- Trees (SVG absolute) -->
    <svg width="100%" height="100%" viewBox="0 0 600 80" preserveAspectRatio="xMidYMid slice" style="position:absolute;top:-60px;left:0;pointer-events:none;">
      <g transform="translate(80,70)">
        <rect x="-6" y="-30" width="12" height="30" rx="3" fill="#7B4A2D"/>
        <ellipse cx="0" cy="-38" rx="22" ry="26" fill="#3D8B37"/>
        <ellipse cx="0" cy="-50" rx="15" ry="18" fill="#4CAF50"/>
      </g>
      <g transform="translate(160,70)">
        <rect x="-5" y="-24" width="10" height="24" rx="3" fill="#7B4A2D"/>
        <ellipse cx="0" cy="-30" rx="18" ry="20" fill="#2E7D32"/>
        <ellipse cx="0" cy="-42" rx="12" ry="15" fill="#388E3C"/>
      </g>
      <g transform="translate(430,70)">
        <rect x="-6" y="-28" width="12" height="28" rx="3" fill="#7B4A2D"/>
        <ellipse cx="0" cy="-36" rx="22" ry="24" fill="#3D8B37"/>
        <ellipse cx="0" cy="-48" rx="14" ry="17" fill="#4CAF50"/>
      </g>
      <g transform="translate(510,70)">
        <rect x="-5" y="-22" width="10" height="22" rx="3" fill="#7B4A2D"/>
        <ellipse cx="0" cy="-28" rx="17" ry="19" fill="#2E7D32"/>
        <ellipse cx="0" cy="-40" rx="11" ry="14" fill="#388E3C"/>
      </g>
    </svg>
  </div>

  <!-- ── SIDEWALK TOP ── -->
  <div id="sidewalk-top"></div>

  <!-- ── ROAD ── -->
  <div id="road">
    <div id="zebra-stripes"></div>
    <!-- Cars are injected here by JS -->
  </div>

  <!-- ── SIDEWALK BOTTOM ── -->
  <div id="sidewalk-bottom"></div>

  <!-- ── GRASS BOTTOM ── -->
  <div id="grass-bottom">
    <svg width="100%" height="100%" viewBox="0 0 600 80" preserveAspectRatio="xMidYMid slice" style="position:absolute;bottom:0;left:0;pointer-events:none;">
      <g transform="translate(50,80)">
        <rect x="-5" y="-24" width="10" height="24" rx="3" fill="#7B4A2D"/>
        <ellipse cx="0" cy="-30" rx="18" ry="20" fill="#2E7D32"/>
        <ellipse cx="0" cy="-42" rx="12" ry="15" fill="#4CAF50"/>
      </g>
      <g transform="translate(540,80)">
        <rect x="-5" y="-24" width="10" height="24" rx="3" fill="#7B4A2D"/>
        <ellipse cx="0" cy="-30" rx="18" ry="20" fill="#3D8B37"/>
        <ellipse cx="0" cy="-42" rx="11" ry="14" fill="#4CAF50"/>
      </g>
    </svg>
  </div>

  <!-- ── UI BOTTOM ── -->
  <div id="ui-bottom">
    <div id="stars-bar"></div>
    <button id="walk-btn" disabled>Walk!</button>
    <div id="level-badge">Level 1</div>
  </div>

  <!-- ── TRAFFIC LIGHTS ── -->
  <div class="traffic-light-container" id="tl-left">
    <div class="traffic-light-box">
      <div class="tl-lens" id="tl-red-l"></div>
      <div class="tl-lens" id="tl-yellow-l"></div>
      <div class="tl-lens" id="tl-green-l"></div>
    </div>
    <div class="tl-pole"></div>
    <div class="tl-base"></div>
    <div class="walk-man-indicator" id="walk-man-l">
      <svg width="28" height="28" viewBox="0 0 28 28">
        <circle cx="14" cy="5" r="4" fill="#555" id="wm-head-l"/>
        <rect x="11" y="10" width="6" height="9" rx="3" fill="#555" id="wm-body-l"/>
        <line x1="11" y1="14" x2="6" y2="19" stroke="#555" stroke-width="2.5" stroke-linecap="round" id="wm-la-l"/>
        <line x1="17" y1="14" x2="22" y2="19" stroke="#555" stroke-width="2.5" stroke-linecap="round" id="wm-ra-l"/>
        <line x1="12" y1="19" x2="10" y2="26" stroke="#555" stroke-width="2.5" stroke-linecap="round" id="wm-ll-l"/>
        <line x1="16" y1="19" x2="18" y2="26" stroke="#555" stroke-width="2.5" stroke-linecap="round" id="wm-rl-l"/>
      </svg>
    </div>
  </div>

  <div class="traffic-light-container" id="tl-right">
    <div class="traffic-light-box">
      <div class="tl-lens" id="tl-red-r"></div>
      <div class="tl-lens" id="tl-yellow-r"></div>
      <div class="tl-lens" id="tl-green-r"></div>
    </div>
    <div class="tl-pole"></div>
    <div class="tl-base"></div>
    <div class="walk-man-indicator" id="walk-man-r">
      <svg width="28" height="28" viewBox="0 0 28 28">
        <circle cx="14" cy="5" r="4" fill="#555" id="wm-head-r"/>
        <rect x="11" y="10" width="6" height="9" rx="3" fill="#555" id="wm-body-r"/>
        <line x1="11" y1="14" x2="6" y2="19" stroke="#555" stroke-width="2.5" stroke-linecap="round" id="wm-la-r"/>
        <line x1="17" y1="14" x2="22" y2="19" stroke="#555" stroke-width="2.5" stroke-linecap="round" id="wm-ra-r"/>
        <line x1="12" y1="19" x2="10" y2="26" stroke="#555" stroke-width="2.5" stroke-linecap="round" id="wm-ll-r"/>
        <line x1="16" y1="19" x2="18" y2="26" stroke="#555" stroke-width="2.5" stroke-linecap="round" id="wm-rl-r"/>
      </svg>
    </div>
  </div>

  <!-- ── CHARACTER ── -->
  <div id="character" class="idle">
    <svg width="52" height="78" viewBox="0 0 52 78" id="char-svg">
      <!-- Hair -->
      <ellipse cx="26" cy="12" rx="14" ry="13" fill="#8B4513"/>
      <!-- Head -->
      <ellipse cx="26" cy="16" rx="13" ry="13" fill="#FDBCB4"/>
      <!-- Eyes -->
      <circle cx="21" cy="14" r="3.5" fill="white"/>
      <circle cx="31" cy="14" r="3.5" fill="white"/>
      <circle cx="22" cy="14.5" r="2" fill="#5C3317" id="eye-l"/>
      <circle cx="32" cy="14.5" r="2" fill="#5C3317" id="eye-r"/>
      <!-- Pupils shine -->
      <circle cx="22.8" cy="13.8" r="0.8" fill="white"/>
      <circle cx="32.8" cy="13.8" r="0.8" fill="white"/>
      <!-- Smile -->
      <path d="M21 21 Q26 26 31 21" stroke="#E57373" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <!-- Nose -->
      <circle cx="26" cy="18" r="1.5" fill="#F4A89A"/>
      <!-- Body (bright orange shirt) -->
      <rect x="16" y="29" width="20" height="22" rx="6" fill="#FF6B35"/>
      <!-- Neck -->
      <rect x="22" y="27" width="8" height="6" rx="3" fill="#FDBCB4"/>
      <!-- Left Arm -->
      <rect x="8" y="30" width="9" height="5" rx="2.5" fill="#FF6B35" id="arm-l" transform-origin="16 32"/>
      <!-- Right Arm -->
      <rect x="35" y="30" width="9" height="5" rx="2.5" fill="#FF6B35" id="arm-r" transform-origin="36 32"/>
      <!-- Hands -->
      <circle cx="10" cy="32" r="4" fill="#FDBCB4" id="hand-l"/>
      <circle cx="42" cy="32" r="4" fill="#FDBCB4" id="hand-r"/>
      <!-- Pants (blue) -->
      <rect x="16" y="48" width="20" height="16" rx="4" fill="#1565C0"/>
      <!-- Left leg -->
      <rect x="16" y="60" width="8" height="14" rx="4" fill="#1565C0" id="leg-l"/>
      <!-- Right leg -->
      <rect x="28" y="60" width="8" height="14" rx="4" fill="#1565C0" id="leg-r"/>
      <!-- Shoes -->
      <ellipse cx="20" cy="74" rx="7" ry="4" fill="#1a1a1a" id="shoe-l"/>
      <ellipse cx="32" cy="74" rx="7" ry="4" fill="#1a1a1a" id="shoe-r"/>
    </svg>
  </div>

  <!-- ── BIRD (distraction level 3) ── -->
  <div id="bird">
    <svg width="60" height="40" viewBox="0 0 60 40">
      <ellipse cx="30" cy="25" rx="18" ry="10" fill="#FF6B6B"/>
      <circle cx="44" cy="20" r="8" fill="#FF8E53"/>
      <ellipse cx="47" cy="19" rx="2" ry="1" fill="#FFD700"/>
      <circle cx="49" cy="18" r="1.5" fill="black"/>
      <path d="M12 25 Q5 10 0 18" stroke="#FF6B6B" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M12 23 Q5 8 -2 14" stroke="#FF8E53" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- ── STAR REWARD ── -->
  <div id="star-reward">
    <svg width="100" height="100" viewBox="0 0 100 100">
      <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="#FFD700" stroke="#FF9F0A" stroke-width="3"/>
      <polygon points="50,18 57,38 79,38 62,51 68,72 50,59 32,72 38,51 21,38 43,38" fill="#FFEC5C"/>
    </svg>
    <div id="star-label">Well Done!</div>
  </div>

  <!-- ── SPEECH BUBBLE ── -->
  <div id="speech-bubble"></div>

  <!-- ── OVERLAY ── -->
  <div id="overlay">
    <div id="overlay-card">
      <div id="overlay-title">Level Complete!</div>
      <div id="overlay-msg">You crossed safely! You are a road safety star!</div>
      <button id="overlay-btn">Next Level!</button>
    </div>
  </div>

</div>
<script src="zebra.js"></script>
</body>
</html>
